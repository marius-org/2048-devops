---
- name: Deploy 2048 game on EC2
  hosts: all
  become: true
  gather_facts: true

  vars:
    app_image: "mariuseu/2048-game:latest"
    app_port: "8200"
    db_port: "5432"

  tasks:

    - name: Update apt packages
      apt:
        update_cache: yes
        upgrade: yes

    - name: Install required dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - apt-transport-https
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Pull latest app image from Docker Hub
      docker_image:
        name: "{{ app_image }}"
        source: pull
        force_source: yes

    - name: Stop existing container if running
      docker_container:
        name: game-2048
        state: absent

    - name: Run 2048 game container
      docker_container:
        name: game-2048
        image: "{{ app_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ app_port }}:{{ app_port }}"
        env:
          DATABASE_URL: "postgresql://{{ db_username }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_name }}"

    - name: Wait for app to be ready
      wait_for:
        host: localhost
        port: "{{ app_port }}"
        delay: 10
        timeout: 60

    - name: Print app URL
      debug:
        msg: "2048 game is running at http://{{ ansible_host }}:{{ app_port }}"